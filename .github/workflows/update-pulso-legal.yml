name: Update Pulso Legal

on:
  schedule:
    - cron: '35 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pulso-legal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update Pulso Legal data
        run: node scripts/update-pulso-legal.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pulso-legal.json
          git diff --cached --quiet || git commit -m "Update Pulso Legal feed"
          git push
